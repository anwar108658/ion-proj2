<ion-content [fullscreen]="true">

  <!-- Header -->
  <div class="headerUI">
    <div class="logo-section">
      <ion-text color="light">
        <h1>Welcome Back</h1>
        <p>Sign in to continue</p>
      </ion-text>
    </div>
  </div>

  <!-- Login Card -->
  <form [formGroup]="loginForm" (submit)="login(loginForm)" class="main-content ion-padding">

    <ion-card class="login-card">

      <ion-card-content>

        <ion-item lines="none" class="input-item">
          <ion-icon
            slot="start"
            name="mail-outline"
            color="primary">
          </ion-icon>

          <ion-input
            type="email"
            placeholder="Email"
            formControlName="email"
            >
          </ion-input>
        </ion-item>

        <ion-item lines="none" class="input-item">
          <ion-icon
            slot="start"
            name="lock-closed-outline"
            color="primary">
          </ion-icon>

          <ion-input
            type="password"
            placeholder="Password"
            formControlName="password"
            >
          </ion-input>
        </ion-item>

        <ion-button
          expand="block"
          shape="round"
          type="submit"
          class="login-btn"
          [disabled]="loginForm.invalid"
          >
          Login
        </ion-button>

        <div class="extra-links">

          <ion-text color="medium">
            Forgot Password?
          </ion-text>

          <ion-text color="primary">
            Create Account
          </ion-text>

        </div>

      </ion-card-content>

    </ion-card>

  </form>

</ion-content>
