<!-- Header with texture background -->
<ion-header class="ion-no-border">
  <ion-toolbar>
    <div class="headerUI">
      <ion-button routerLink="/home" color="light" shape="round" class="close-btn">
        <ion-icon  class="ion-padding" slot="icon-only" name="close-outline"></ion-icon>
      </ion-button>
      <div class="header-title-container">
        <ion-text color="light">
          Add New Task
        </ion-text>
      </div>
    </div>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <!-- Form Content Area -->
  <form [formGroup]="taskForm" class="ion-padding main-content">
    <ion-card class="form-card">
      <ion-card-content>
        <!-- Task Title Input -->
        <div class="input-group">
          <ion-label [class.error]="taskForm.controls.task.invalid && taskForm.controls.task.touched" class="form-label">Task Title</ion-label>
          <ion-item lines="none" class="custom-input-item">
            <ion-input  formControlName="task" placeholder="Pick up"></ion-input>
          </ion-item>
        </div>

        <!-- Category Selector -->
        <div class="input-group category-group-container">
          <ion-label class="form-label">Category</ion-label>
          <div class="category-group">
            @for (item of categoryList; track $index) {
              <ion-button size="medium" shape="round" (click)="getCategoryVal({cat:item.iconName,color:item.color})" [fill]="($any(taskForm.controls.category.value).cat === item.iconName) ? 'solid' : 'outline'"   [color]="item.color" class="ion-no-border  light-bg-button">
                <ion-icon slot="icon-only" [name]="item.iconName" ></ion-icon>
              </ion-button>
            }
          </div>
        </div>

        <!-- When (Date & Time) Picker -->
        <div class="input-group">
          <ion-label class="form-label">When</ion-label>
          <div class="datetime-row">
            <!-- Date Picker Item -->
            <div lines="none"  (click)="isFormOpen('date')" class="custom-input-item datetime-item">
              <ion-datetime-button datetime="date-picker" class="disable-pointer"></ion-datetime-button>
              <ion-modal [isOpen]="inputFormOpen.date" (ionModalDidDismiss)="isFormOpen('date')" [keepContentsMounted]="true">
                <ng-template>
                  <ion-datetime [preferWheel]="true" formControlName="date" id="date-picker" presentation="date"></ion-datetime>
                </ng-template>
              </ion-modal>
              <ion-icon color="tertiary" name="calendar-clear-outline" slot="end" class="input-icon"></ion-icon>
            </div>

            <!-- Time Picker Item -->
            <div lines="none" (click)="isFormOpen('time')" class="custom-input-item datetime-item">
              <ion-datetime-button color="secondary" datetime="time-picker" class="disable-pointer"></ion-datetime-button>
              <ion-modal [isOpen]="inputFormOpen.time" (ionModalDidDismiss)="isFormOpen('time')" [keepContentsMounted]="true">
                <ng-template>
                  <ion-datetime formControlName="time" id="time-picker" presentation="time"></ion-datetime>
                </ng-template>
              </ion-modal>
              <ion-icon color="tertiary" name="time-outline" slot="end" class="input-icon"></ion-icon>
            </div>
          </div>
        </div>

        <!-- Notes Textarea -->
        <div class="input-group">
          <ion-label [class.error]="taskForm.controls.task.invalid && taskForm.controls.task.touched" class="form-label">Notes</ion-label>
          <ion-item lines="none" class="custom-input-item textarea-item">
            <ion-textarea formControlName="taskDetail" placeholder="Add your notes here" rows="10"></ion-textarea>
          </ion-item>
        </div>
      </ion-card-content>
    </ion-card>
  </form>
</ion-content>

<ion-footer class="ion-no-border ion-padding">
  <ion-button (click)="onSubmit()" expand="block" class="footer-btn" shape="round" size="large">
    <ion-text color="light">Save</ion-text>
  </ion-button>
</ion-footer>
