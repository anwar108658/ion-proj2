<ion-content [fullscreen]="true">
  <ion-header class="ion-no-border">
    <div class="headerUI">
      <div class="hui1">
        <ion-button  color="light" shape="round">
          <ion-icon class="ion-padding" slot="icon-only" name="chevron-back-outline"></ion-icon>
        </ion-button>
        <ion-text color="light">October 20,2022</ion-text>
      </div>
      <div class="hui2">
        <ion-text color="light">
          <h1>My Todo List</h1>
        </ion-text>
      </div>
    </div>
  </ion-header> 

  <div class="ion-padding main-content">
    <ion-card class="m-card-1 m-card">
      <ion-card-content class="ion-no-padding">
        <ion-list [scrollTop]="true"  lines="none">
          @for (item of items; track $index) {
            <div class="list-item">
              <ion-item expand="block">
                <div style="display: flex;align-items: center;">
                  <ion-icon 
                  size="large" 
                  slot="icon-only" 
                  [name]="item.iconName"
                  [color]="item.color"
                  class="loop-circle-icon"
                  ></ion-icon>
                </div>
                <ion-label>{{item?.label}}</ion-label>
              </ion-item>
              <ion-checkbox [checked]="false" color="tertiary" slot="end"></ion-checkbox>
            </div>
          }
        </ion-list>
      </ion-card-content>
    </ion-card>
    <ion-text class="ion-padding section-title">
      Completed
    </ion-text>
    <ion-card class="m-card-2 m-card">
      <ion-card-content>
        <ion-list lines="none">
          @for (item of items; track $index) {
            <div class="list-item">
              <ion-item disabled>
                <div style="display: flex;align-items: center;">
                  <ion-icon
                  size="large" 
                  slot="icon-only"
                  [name]="item.iconName"
                  [color]="item.color"
                  class="ion-padding loop-circle-icon"
                  ></ion-icon>
                </div>
                <ion-label>first Item</ion-label>
              </ion-item>
              <ion-checkbox [checked]="true" color="tertiary" slot="end"></ion-checkbox>
            </div>
          }
        </ion-list>
      </ion-card-content>
    </ion-card>
  </div>

</ion-content>

<ion-footer class="ion-no-border ion-padding">
  <ion-button routerLink="/task" expand="block" class="footer-btn" shape="round" size="large">
    <ion-text color="light">Add New Task</ion-text>
  </ion-button>
</ion-footer>
